[colors]
# Background of the launcher window (bg0)
background=2d353bff

# Main text / foreground (fg)
text=d3c6aaff

# Matched characters highlight (green)
match=a7c080ff

# Selection highlight background (bg2)
selection=3d484dff

# Selected item text (fg)
selection-text=d3c6aaff

# Matched characters in selected item (aqua)
selection-match=83c092ff

# Border around the window (bg4)
border=4f585eff

# Placeholder / prompt text (grey1)
prompt=859289ff

# Input text (fg)
input=d3c6aaff

[border]
# Soft rounded border, 2px width
width=2
radius=8

[prompt]
# You can change the prompt glyph here
prompt=> 
